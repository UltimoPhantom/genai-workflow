services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"  # 5432 taken by local postgres

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
    ports:
      - "5672:5672"
      - "15672:15672"  # management UI

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9000:9000"
      - "9001:9001"  # console

  # ─── Application ───────────────────────────────────────────────────────────

  tts-service:
    build:
      context: ./tts-service
      dockerfile: Dockerfile
    volumes:
      - piper_models:/models   # cache downloaded voice models across restarts
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s       # model download on first boot takes time
    ports:
      - "5050:5050"            # exposed for local testing; workers use internal DNS
    restart: on-failure

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: on-failure

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file: .env
    environment:
      TTS_SERVICE_URL: http://tts-service:5050
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      tts-service:
        condition: service_healthy
    deploy:
      # 5 workers: pika consumes one message at a time per process, so worker
      # count == max parallel TTS attempts. With 5 workers a burst produces 5
      # simultaneous semaphore acquires → exactly 3 proceed, 2 block. This is
      # what makes Constraint A (3-concurrent cap) actually observable.
      replicas: 5
    restart: on-failure

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  piper_models:
